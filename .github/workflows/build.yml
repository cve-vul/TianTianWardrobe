name: Build and Release APK

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if echo "$GITHUB_REF" | grep -q "refs/tags/"; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Update version in build.gradle.kts
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" app/build.gradle.kts

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          APK_NAME="TianTianWardrobe-v${VERSION}.apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
        id: rename

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: "TianTianWardrobe v${{ steps.version.outputs.value }}"
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.value) }}
          files: ${{ steps.rename.outputs.apk_name }}
          generate_release_notes: false
          body: |
            ## 天天衣橱 v${{ steps.version.outputs.value }}

            - AI 智能穿搭推荐（支持 OpenAI / DeepSeek / 通义千问）
            - 拍照录入衣物，自动识别类别和颜色
            - 二十四节气黄道参考
            - 衣柜分类管理

            ### 安装方式
            下载 APK 文件，在 Android 手机上直接安装。
